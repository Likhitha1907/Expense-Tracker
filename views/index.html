<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
background:#eef2f7;
margin:0;
}

.container{
background:white;
padding:25px;
border-radius:12px;
width:500px;
margin:auto;
margin-top:60px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#4f46e5;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

/* Expense Cards */
li{
background:white;
padding:15px;
margin-top:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

/* Category badge */
.category{
padding:4px 10px;
border-radius:6px;
font-size:12px;
background:#e0e7ff;
color:#3730a3;
margin-left:10px;
}

/* Actions */
.actions button{
background:#ef4444;
margin-left:5px;
padding:5px 10px;
border-radius:6px;
}

.actions button:first-child{
background:#22c55e;
}

</style>
</head>

<body>

<div class="topbar">
<a href="https://expense-tracker-backend-13y9.onrender.com/logout">
<button class="logout">Logout</button>
</a>
</div>

<div class="container">

<h2>Expense Tracker</h2>

<form id="expenseForm">

<input id="title" type="text" placeholder="Expense title" required>

<input id="amount" type="number" placeholder="Amount" required>

<input id="date" type="date" required>

<select id="category" required>
  <option value="">Select Category</option>
  
  <option value="Food">🍔 Food</option>
  <option value="Travel">✈️ Travel</option>
  <option value="Shopping">🛍️ Shopping</option>
  <option value="Bills">💡 Bills</option>
  <option value="Entertainment">🎬 Entertainment</option>
  <option value="Health">🏥 Health</option>
  <option value="Education">📚 Education</option>
  <option value="Transport">🚗 Transport</option>
  <option value="Groceries">🛒 Groceries</option>
  <option value="Others">📦 Others</option>
  
  </select>

<button type="submit">Save Expense</button>

</form>

<h3>Expenses</h3>

<ul id="expenseList"></ul>

</div>

<script>

const API = "https://expense-tracker-backend-13y9.onrender.com";

const form = document.getElementById("expenseForm");
const list = document.getElementById("expenseList");

let editId = null;

// ✅ LOAD EXPENSES
async function loadExpenses(){
try {
const res = await fetch(API + "/expenses", {
  credentials: "include"
});

const data = await res.json();

list.innerHTML = "";

data.forEach(exp => {

const li = document.createElement("li");

const text = document.createElement("span");
text.innerHTML = `
<strong>${exp.title}</strong> - ₹${exp.amount}
<span class="category">${exp.category}</span>
<br><small>${exp.date}</small>
`;

const actions = document.createElement("div");
actions.className = "actions";

const editBtn = document.createElement("button");
editBtn.innerText = "Edit";

editBtn.onclick = () => {
editId = exp._id;

document.getElementById("title").value = exp.title;
document.getElementById("amount").value = exp.amount;
document.getElementById("category").value = exp.category;
document.getElementById("date").value = exp.date;
};

const deleteBtn = document.createElement("button");
deleteBtn.innerText = "Delete";

deleteBtn.onclick = async () => {
await fetch(API + "/expenses/" + exp._id,{
  method:"DELETE",
  credentials:"include"
});
loadExpenses();
};

actions.appendChild(editBtn);
actions.appendChild(deleteBtn);

li.appendChild(text);
li.appendChild(actions);

list.appendChild(li);

});

} catch(err){
console.log("Error:", err);
}
}

// ✅ ADD / UPDATE EXPENSE
form.addEventListener("submit", async (e)=>{

e.preventDefault();

const title = document.getElementById("title").value;
const amount = document.getElementById("amount").value;
const category = document.getElementById("category").value;
const date = document.getElementById("date").value;

if(editId){

await fetch(API + "/expenses/" + editId,{
  method:"PUT",
  credentials:"include",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({title,amount,category,date})
});

editId = null;

}else{

await fetch(API + "/expenses",{
  method:"POST",
  credentials:"include",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({title,amount,category,date})
});

}

form.reset();
loadExpenses();

});

// ✅ LOAD ON START
loadExpenses();

</script>

</body>
</html>
