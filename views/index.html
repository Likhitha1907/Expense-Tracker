<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
color:#2c3e50;
min-height:100vh;
padding:20px;
}

/* Top bar */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logout{
background:#e53935;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* Container */
.container{
display:grid;
grid-template-columns: 1fr 1fr;
gap:20px;
}

/* Cards */
.card{
background: rgba(255,255,255,0.6);
backdrop-filter: blur(10px);
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
/* Headings */
h2,h3{
margin-bottom:15px;
}

/* Inputs */
input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
background:#3b82f6;
color:white;
font-weight:500;
border:none;
transition:0.3s;
}

button:hover{
background:#2563eb;
}

/* Expense List */
ul{
list-style:none;
margin-top:15px;
}

li{
background:rgba(255,255,255,0.15);
padding:10px;
margin-top:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* Actions */
.actions button{
width:auto;
padding:5px 10px;
margin-left:5px;
background:#1565c0;
}

.delete{
background:#e53935 !important;
}

/* Total box */
.total{
color:#1e293b;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<h2>Expense Tracker</h2>
<a href="/logout"><button class="logout">Logout</button></a>
</div>

<div class="container">

<!-- LEFT: FORM -->
<div class="card">
<h3>Add Expense</h3>

<form id="expenseForm">
<input id="title" placeholder="Title" required>
<input id="amount" type="number" placeholder="Amount" required>
<input id="date" type="date" required>

<select id="category" required>
    <option value="">Select Category</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Entertainment</option>
    <option>Bills</option>
    <option>Health</option>
    <option>Education</option>
    <option>Others</option>
    </select>

<button type="submit">Save Expense</button>
</form>
</div>

<!-- RIGHT: EXPENSES -->
<div class="card">
<h3>Your Expenses</h3>

<div class="total">Total: ₹ <span id="total">0</span></div>

<ul id="expenseList"></ul>
</div>

</div>

<script>

const form = document.getElementById("expenseForm");
const list = document.getElementById("expenseList");
const totalEl = document.getElementById("total");

let editId = null;

async function loadExpenses(){
const res = await fetch("/expenses");
const data = await res.json();

list.innerHTML = "";
let total = 0;

data.forEach(exp => {

total += Number(exp.amount);

const li = document.createElement("li");

li.innerHTML = `
<span>${exp.title} - ₹${exp.amount}</span>
<div class="actions">
<button onclick="editExpense('${exp._id}','${exp.title}','${exp.amount}','${exp.category}','${exp.date}')">Edit</button>
<button class="delete" onclick="deleteExpense('${exp._id}')">Delete</button>
</div>
`;

list.appendChild(li);

});

totalEl.innerText = total;
}

function editExpense(id,title,amount,category,date){
editId = id;
document.getElementById("title").value = title;
document.getElementById("amount").value = amount;
document.getElementById("category").value = category;
document.getElementById("date").value = date;
}

async function deleteExpense(id){
await fetch("/expenses/" + id,{
method:"DELETE"
});
loadExpenses();
}

form.addEventListener("submit", async (e)=>{
e.preventDefault();

const title = document.getElementById("title").value;
const amount = document.getElementById("amount").value;
const category = document.getElementById("category").value;
const date = document.getElementById("date").value;

if(editId){
await fetch("/expenses/" + editId,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,amount,category,date})
});
editId = null;
}else{
await fetch("/expenses",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,amount,category,date})
});
}

form.reset();
loadExpenses();
});

loadExpenses();

</script>

</body>
</html>
