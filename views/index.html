<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
padding-top:60px;
}

.topbar{
position:absolute;
top:20px;
right:20px;
}

.logout{
background:#e53935;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:450px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1e88e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#f1f1f1;
padding:10px;
margin-top:8px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
width:auto;
padding:5px 10px;
margin-left:5px;
}
</style>
</head>

<body>

<div class="topbar">
<a href="https://expense-tracker-backend-13y9.onrender.com/logout">
<button class="logout">Logout</button>
</a>
</div>

<div class="container">

<h2>Expense Tracker</h2>

<form id="expenseForm">

<input id="title" type="text" placeholder="Expense title" required>

<input id="amount" type="number" placeholder="Amount" required>

<input id="date" type="date" required>

<select id="category" required>
<option value="">Select Category</option>
<option value="Food">Food</option>
<option value="Travel">Travel</option>
<option value="Shopping">Shopping</option>
</select>

<button type="submit">Save Expense</button>

</form>

<h3>Expenses</h3>

<ul id="expenseList"></ul>

</div>

<script>

const API = "https://expense-tracker-backend-13y9.onrender.com";

const form = document.getElementById("expenseForm");
const list = document.getElementById("expenseList");

let editId = null;

// ✅ LOAD EXPENSES
async function loadExpenses(){
try {
const res = await fetch(API + "/expenses", {
  credentials: "include"
});

const data = await res.json();

list.innerHTML = "";

data.forEach(exp => {

const li = document.createElement("li");

const text = document.createElement("span");
text.innerText = `${exp.title} - ₹${exp.amount} (${exp.category}) - ${exp.date}`;

const actions = document.createElement("div");
actions.className = "actions";

const editBtn = document.createElement("button");
editBtn.innerText = "Edit";

editBtn.onclick = () => {
editId = exp._id;

document.getElementById("title").value = exp.title;
document.getElementById("amount").value = exp.amount;
document.getElementById("category").value = exp.category;
document.getElementById("date").value = exp.date;
};

const deleteBtn = document.createElement("button");
deleteBtn.innerText = "Delete";

deleteBtn.onclick = async () => {
await fetch(API + "/expenses/" + exp._id,{
  method:"DELETE",
  credentials:"include"
});
loadExpenses();
};

actions.appendChild(editBtn);
actions.appendChild(deleteBtn);

li.appendChild(text);
li.appendChild(actions);

list.appendChild(li);

});

} catch(err){
console.log("Error:", err);
}
}

// ✅ ADD / UPDATE EXPENSE
form.addEventListener("submit", async (e)=>{

e.preventDefault();

const title = document.getElementById("title").value;
const amount = document.getElementById("amount").value;
const category = document.getElementById("category").value;
const date = document.getElementById("date").value;

if(editId){

await fetch(API + "/expenses/" + editId,{
  method:"PUT",
  credentials:"include",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({title,amount,category,date})
});

editId = null;

}else{

await fetch(API + "/expenses",{
  method:"POST",
  credentials:"include",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({title,amount,category,date})
});

}

form.reset();
loadExpenses();

});

// ✅ LOAD ON START
loadExpenses();

</script>

</body>
</html>
