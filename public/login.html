<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

    .hero {
      text-align: center;
      padding: 40px;
      background: #eef2ff;
    }

    .container {
      width: 80%;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    .expense {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
  </style>
</head>

<body>

<header>
  <h2>Expense Tracker</h2>
  <button onclick="logout()">Logout</button>
</header>

<section class="hero">
  <h1>Track Your Expenses 💸</h1>
  <p>Add, view, and manage your expenses easily</p>
</section>

<div class="container">

  <!-- LOGIN BUTTON -->
  <button onclick="loginWithGoogle()">Sign in with Google</button>

  <!-- ADD EXPENSE -->
  <h3>Add Expense</h3>
  <input type="text" id="title" placeholder="Title">
  <input type="number" id="amount" placeholder="Amount">
  <button onclick="addExpense()">Add</button>

  <!-- EXPENSE LIST -->
  <h3>My Expenses</h3>
  <div id="expenseList"></div>

</div>

<script>
const API = "https://expense-tracker-backend-13y9.onrender.com";

// ✅ GOOGLE LOGIN
function loginWithGoogle() {
  window.location.href = API + "/auth/google";
}

// ✅ LOGOUT
function logout() {
  window.location.href = API + "/logout";
}

// ✅ LOAD EXPENSES
async function loadExpenses() {
  try {
    const res = await fetch(API + "/expenses", {
      credentials: "include"
    });

    const data = await res.json();

    const list = document.getElementById("expenseList");
    list.innerHTML = "";

    data.forEach(exp => {
      list.innerHTML += `
        <div class="expense">
          <strong>${exp.title}</strong> - ₹${exp.amount}
        </div>
      `;
    });

  } catch (err) {
    console.log("Error:", err);
  }
}

// ✅ ADD EXPENSE
async function addExpense() {
  const title = document.getElementById("title").value;
  const amount = document.getElementById("amount").value;

  await fetch(API + "/expenses", {
    method: "POST",
    credentials: "include",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, amount })
  });

  loadExpenses(); // refresh list
}

// ✅ LOAD ON PAGE START
loadExpenses();
</script>

</body>
</html>
